- name: Deploy Maven Artifact
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/dev8/target/maven-example-1.0-SNAPSHOT.jar
        dest: /opt/maven-example-1.0-SNAPSHOT.jar

    - name: Run application
      shell: nohup java -jar /opt/maven-example-1.0-SNAPSHOT.jar > /dev/null 2>&1 &
