---
- name : Deploy Maven Artifact
  hosts : web
  become : yes
  tasks :
    - name : copy JAR file
      copy : 
        src : /var/lab/jenkins/workspace/mavenprog/maven-example/target/maven-example-1.0-SNAPSHOT.jar
        dest : /opt/maven-example-1.0-SNAPSHOT.jar
    - name : Run application
      shell : nohup java -jar/opt/maven-example-1.0-SNAPSHOT.jar &
       
